name: Deploy mystery-animal

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            cd /opt/mystery-animal
            git pull origin main
            npm install
            npm run build

            pm2 restart mystery-animal || pm2 start npm --name "mystery-animal" -- run preview -- --host 0.0.0.0 --port 8092

            pm2 save